<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Investment Group Israel</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="/IGI_Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAFAF8;
            --color-text: #1A1A1A;
            --color-text-light: #6B6B6B;
            --color-gold: #B8973A;
            --color-border: #E8E6E1;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        img.logo { height: 56px; object-fit: contain; margin-bottom: 2.5rem; }
        .code {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--color-gold);
            font-weight: 500;
            margin-bottom: 1.25rem;
        }
        h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 1.25rem;
        }
        p {
            color: var(--color-text-light);
            font-size: 1rem;
            font-weight: 300;
            max-width: 440px;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }
        .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .links a {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            border: 1px solid var(--color-border);
            border-radius: 3px;
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .links a:hover { border-color: var(--color-gold); color: var(--color-gold); }
        .links a.primary { background: var(--color-gold); color: #fff; border-color: var(--color-gold); }
        .links a.primary:hover { background: #fff; color: var(--color-gold); }
    </style>
</head>
<body>
    <a href="/"><img class="logo" src="/IGI_Logo.png" alt="Investment Group Israel"></a>
    <div class="code">Error 404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved. Try one of the links below.</p>
    <div class="links">
        <a class="primary" href="/">Home</a>
        <a href="/igi/">IGI</a>
        <a href="/kolami/">Kol Ami Fund</a>
        <a href="/research/">Research</a>
        <a href="/events/">Events</a>
    </div>
</body>
</html>
